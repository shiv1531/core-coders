<!DOCTYPE html>
<html>

<head>

    <title>AI Interview</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }

        input,
        select,
        button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>

</head>

<body>

    <h2>AI Interview Platform</h2>

    <label>Username</label>
    <input type="text" id="username">

    <br>

    <label>Select Mode</label>

    <select id="mode" onchange="loadQuestion()">

        <option value="technical">Technical</option>
        <option value="hr">HR</option>

    </select>

    <h3 id="question"></h3>

    <input type="text" id="answer" placeholder="Type answer">

    <button onclick="submitAnswer()">Submit</button>

    <button onclick="loadQuestion()">Next Question</button>

    <button onclick="showLeaderboard()">Leaderboard</button>

    <button onclick="startVoice()"> Speak Answer</button>

    <h3 id="result"></h3>

    <div id="leaderboard"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <canvas id="scoreChart"></canvas>

    <script>

        let currentQuestion = ""

        async function loadQuestion() {

            const mode = document.getElementById("mode").value

            let url = mode === "technical"
                ? "http://127.0.0.1:8000/get-technical-question"
                : "http://127.0.0.1:8000/get-hr-question"

            const res = await fetch(url)

            const data = await res.json()

            currentQuestion = data.question

            document.getElementById("question").innerText = data.question

        }

        window.onload = loadQuestion


        async function submitAnswer() {

            const username = document.getElementById("username").value

            const answer = document.getElementById("answer").value

            const mode = document.getElementById("mode").value

            const response = await fetch("http://127.0.0.1:8000/submit-answer", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    username: username,
                    mode: mode,
                    question: currentQuestion,
                    answer: answer

                })

            })

            const data = await response.json()

            document.getElementById("result").innerHTML =

                `Score: ${data.score} <br> Feedback: ${data.feedback}`

            document.getElementById("answer").value = ""

        }


        async function showLeaderboard() {

            const res = await fetch("http://127.0.0.1:8000/leaderboard")

            const data = await res.json()

            let html = "<h3>Leaderboard</h3>"

            data.leaderboard.forEach(user => {

                html += `<p>${user.rank}. ${user.username} ⭐ ${user.average_score}</p>`

            })

            document.getElementById("leaderboard").innerHTML = html

        }
        async function loadDashboard() {

            const username = document.getElementById("username").value

            const res = await fetch(`http://127.0.0.1:8000/user-dashboard/${username}`)

            const data = await res.json()

            const ctx = document.getElementById("scoreChart")

            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: ["HR", "Technical"],
                    datasets: [{
                        label: "Average Score",
                        data: [data.hr_average, data.technical_average]
                    }]
                }
            })

        }
        function startVoice() {

            const recognition = new webkitSpeechRecognition()

            recognition.lang = "en-US"

            recognition.start()

            recognition.onresult = function (event) {

                document.getElementById("answer").value =
                    event.results[0][0].transcript

            }

        }

    </script>

</body>

</html>
